name: Unity Benchmark Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  benchmark_full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gitnexus/package-lock.json
      - run: npm ci
        working-directory: gitnexus
      - run: npm run benchmark:full
        working-directory: gitnexus
      - run: npm run benchmark:agent-context:quick
        working-directory: gitnexus
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-benchmark-report
          path: gitnexus/.gitnexus/benchmark/
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-context-benchmark-report
          path: gitnexus/.gitnexus/benchmark-agent-context/
          if-no-files-found: warn

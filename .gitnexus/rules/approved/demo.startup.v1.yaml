id: demo.startup.v1
version: 1.0.0
trigger_family: startup
resource_types:
  - unspecified_resource
host_base_type:
  - unspecified_host
required_hops:
  - resource
  - guid_map
  - code_loader
  - code_runtime
guarantees:
  - 'startup trigger matching is confirmed'
non_guarantees:
  - 'does not prove full runtime ordering'
next_action: 'gitnexus query "Startup Graph Trigger"'
match:
  trigger_tokens:
    - startup
topology:
  - hop: resource
    from:
      entity: resource
    to:
      entity: script
    edge:
      kind: binds_script
  - hop: guid_map
    from:
      entity: script
    to:
      entity: script
    edge:
      kind: calls
  - hop: code_loader
    from:
      entity: script
    to:
      entity: script
    edge:
      kind: calls
  - hop: code_runtime
    from:
      entity: script
    to:
      entity: runtime
    edge:
      kind: calls
closure:
  required_hops:
    - resource
    - guid_map
    - code_loader
    - code_runtime
  failure_map:
    missing_evidence: rule_matched_but_evidence_missing
claims:
  guarantees:
    - 'startup trigger matching is confirmed'
  non_guarantees:
    - 'does not prove full runtime ordering'
  next_action: 'gitnexus query "Startup Graph Trigger"'
